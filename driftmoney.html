            recurringTemplates: [
                { id: 'dt1', name: 'Paycheck', amount: 1100, startDate: '2026-04-17', endDate: '', type: 'income', intervalType: 'days', intervalValue: 14, monthDay: 1 },
                { id: 'dt2', name: 'Rent', amount: 1450, startDate: '2026-05-01', endDate: '', type: 'expense', intervalType: 'monthDay', intervalValue: 30, monthDay: 1 },
                { id: 'dt3', name: 'Car Payment', amount: 312, startDate: '2026-04-20', endDate: '2028-04-20', type: 'expense', intervalType: 'monthDay', intervalValue: 30, monthDay: 20 },
                { id: 'dt4', name: 'Electric Bill', amount: 94, startDate: '2026-04-22', endDate: '', type: 'expense', intervalType: 'monthDay', intervalValue: 30, monthDay: 22 },
                { id: 'dt5', name: 'Internet', amount: 65, startDate: '2026-04-28', endDate: '', type: 'expense', intervalType: 'monthDay', intervalValue: 30, monthDay: 28 },
                { id: 'dt6', name: 'Phone', amount: 48, startDate: '2026-04-15', endDate: '', type: 'expense', intervalType: 'monthDay', intervalValue: 30, monthDay: 15 },
                { id: 'dt7', name: 'Streaming Services', amount: 42, startDate: '2026-04-10', endDate: '', type: 'expense', intervalType: 'monthDay', intervalValue: 30, monthDay: 10 },
                { id: 'dt8', name: 'Car Insurance', amount: 138, startDate: '2026-04-05', endDate: '', type: 'expense', intervalType: 'monthDay', intervalValue: 30, monthDay: 5 },
                { id: 'dt9', name: 'Groceries', amount: 320, startDate: '2026-04-25', endDate: '', type: 'expense', intervalType: 'monthDay', intervalValue: 30, monthDay: 25 },
                { id: 'dt10', name: 'Tax Refund', amount: 4800, startDate: '2027-03-01', endDate: '', type: 'income', intervalType: 'months', intervalValue: 12, monthDay: 1 },
            ]
        };

        function CashFlowTracker() {
            const [startingBalance, setStartingBalance] = useState(0);
            const [transactions, setTransactions] = useState([]);
            const [recurringTemplates, setRecurringTemplates] = useState([]);
            const [newTransaction, setNewTransaction] = useState({
                name: '',
                amount: '',
                date: '',
                type: 'expense',
                isOverride: false,
                overrideBalance: ''
            });
            const [newRecurring, setNewRecurring] = useState({
                name: '',
                amount: '',
                startDate: '',
                endDate: '',
                type: 'expense',
                intervalType: 'days',
                intervalValue: 30,
                monthDay: 1
            });
            // Synchronous init helper — reads prefs before first render to prevent flash
            const getInitialUiPref = (key, demoDefault, userDefault) => {
                try {
                    // Determine demo vs my data synchronously
                    const oldRaw = localStorage.getItem('cashFlowData');
                    const userRaw = localStorage.getItem('driftmoney_userdata') || oldRaw;
                    let isMyData = false;
                    if (userRaw) {
                        const p = JSON.parse(userRaw);
                        isMyData = (p.transactions && p.transactions.length > 0) ||
                                   (p.recurringTemplates && p.recurringTemplates.length > 0) ||
                                   (p.startingBalance && p.startingBalance !== 0);
                    }
                    if (!isMyData) return demoDefault;
                    const prefsRaw = localStorage.getItem('driftmoney_uiprefs');
                    if (!prefsRaw) return userDefault;
                    const prefs = JSON.parse(prefsRaw);
                    return prefs[key] !== undefined ? prefs[key] : userDefault;
                } catch(e) { return demoDefault; }
            };

            const [forecastMonths, setForecastMonths] = useState(() => getInitialUiPref('forecastMonths', 12, 3));
            const [showRecurring, setShowRecurring] = useState(() => getInitialUiPref('showRecurring', true, true));
            const [showOneTime, setShowOneTime] = useState(() => getInitialUiPref('showOneTime', true, true));
            const [hidePrevious, setHidePrevious] = useState(() => getInitialUiPref('hidePrevious', false, false));
            const [displayStartDate, setDisplayStartDate] = useState(() => getInitialUiPref('displayStartDate', '', ''));
            const [viewMode, setViewMode] = useState(() => getInitialUiPref('viewMode', 'detailed', 'detailed'));
            const [showSetup, setShowSetup] = useState(() => getInitialUiPref('showSetup', true, true));
            const [editingTransaction, setEditingTransaction] = useState(null);
            const [editingTemplate, setEditingTemplate] = useState(null);
            const [isDemo, setIsDemo] = useState(true);
            const [balanceFocused, setBalanceFocused] = useState(false);
            const [balanceRawInput, setBalanceRawInput] = useState('');
            const [showAbout, setShowAbout] = useState(false);

            const USER_KEY = 'driftmoney_userdata';
            const UI_KEY = 'driftmoney_uiprefs';

            const DEMO_UI = {
                forecastMonths: 12,
                showSetup: true,
                showRecurring: true,
                showOneTime: true,
                viewMode: 'detailed',
                hidePrevious: false,
                displayStartDate: ''
            };

            const loadUserData = () => {
                // Migrate from old key if needed
                const oldData = localStorage.getItem('cashFlowData');
                const newData = localStorage.getItem(USER_KEY);
                if (oldData && !newData) {
                    localStorage.setItem(USER_KEY, oldData);
                    localStorage.removeItem('cashFlowData');
                }
                const raw = localStorage.getItem(USER_KEY);
                if (!raw) return null;
                try {
                    const parsed = JSON.parse(raw);
                    const hasData = (parsed.transactions && parsed.transactions.length > 0) ||
                                    (parsed.recurringTemplates && parsed.recurringTemplates.length > 0) ||
                                    (parsed.startingBalance && parsed.startingBalance !== 0);
                    return hasData ? parsed : null;
                } catch(e) { return null; }
            };

            const saveUserData = (bal, txns, templates) => {
                localStorage.setItem(USER_KEY, JSON.stringify({
                    startingBalance: bal,
                    transactions: txns,
                    recurringTemplates: templates,
                    lastUpdated: new Date().toISOString()
                }));
            };

            const loadUiPrefs = () => {
                const raw = localStorage.getItem(UI_KEY);
                if (!raw) return null;
                try { return JSON.parse(raw); } catch(e) { return null; }
            };

            const saveUiPrefs = (prefs) => {
                localStorage.setItem(UI_KEY, JSON.stringify(prefs));
            };

            const applyUiPrefs = (prefs) => {
                if (!prefs) return;
                if (prefs.forecastMonths !== undefined) setForecastMonths(prefs.forecastMonths);
                if (prefs.showSetup !== undefined) setShowSetup(prefs.showSetup);
                if (prefs.showRecurring !== undefined) setShowRecurring(prefs.showRecurring);
                if (prefs.showOneTime !== undefined) setShowOneTime(prefs.showOneTime);
                if (prefs.viewMode !== undefined) setViewMode(prefs.viewMode);
                if (prefs.hidePrevious !== undefined) setHidePrevious(prefs.hidePrevious);
                if (prefs.displayStartDate !== undefined) setDisplayStartDate(prefs.displayStartDate);
            };

            const getTodayString = () => {
                const t = new Date();
                return t.getFullYear() + '-' + String(t.getMonth() + 1).padStart(2, '0') + '-' + String(t.getDate()).padStart(2, '0');
            };

            const handleHidePreviousChange = (checked) => {
                setHidePrevious(checked);
                if (checked) {
                    setDisplayStartDate(getTodayString());
                } else {
                    setDisplayStartDate('');
                }
            };

            const handleDisplayStartDateChange = (val) => {
                setDisplayStartDate(val);
                setHidePrevious(val !== '');
            };

            // Scenario C on mount: real data exists → My Data mode; otherwise Demo mode
            useEffect(() => {
                const userData = loadUserData();
                if (userData) {
                    setStartingBalance(userData.startingBalance || 0);
                    setTransactions(userData.transactions || []);
                    setRecurringTemplates(userData.recurringTemplates || []);
                    setIsDemo(false);
                    // Restore UI prefs — from saved prefs or embedded in export file
                    const savedPrefs = loadUiPrefs();
                    const embedPrefs = userData.uiPrefs || null;
                    applyUiPrefs(savedPrefs || embedPrefs);
                } else {
                    setStartingBalance(0);
                    setTransactions([]);
                    setRecurringTemplates([]);
                    setIsDemo(true);
                    applyUiPrefs(DEMO_UI);
                }
            }, []);

            // Save user data only when NOT in demo mode
            useEffect(() => {
                if (isDemo) return;
                saveUserData(startingBalance, transactions, recurringTemplates);
            }, [startingBalance, transactions, recurringTemplates, isDemo]);

            // Save UI prefs only when NOT in demo mode
            useEffect(() => {
                if (isDemo) return;
                saveUiPrefs({ forecastMonths, showSetup, showRecurring, showOneTime, viewMode, hidePrevious, displayStartDate });
            }, [forecastMonths, showSetup, showRecurring, showOneTime, viewMode, hidePrevious, displayStartDate, isDemo]);

            const switchToDemo = () => {
                setIsDemo(true);
                applyUiPrefs(DEMO_UI);
            };

            const switchToMyData = () => {
                const userData = loadUserData();
                if (userData) {
                    setStartingBalance(userData.startingBalance || 0);
                    setTransactions(userData.transactions || []);
                    setRecurringTemplates(userData.recurringTemplates || []);
                } else {
                    setStartingBalance(0);
                    setTransactions([]);
                    setRecurringTemplates([]);
                }
                setIsDemo(false);
                const savedPrefs = loadUiPrefs();
                applyUiPrefs(savedPrefs);
            };

            // Strict segregation: demo mode always reads DEMO_DATA, never touches state
            const activeStartingBalance = isDemo ? DEMO_DATA.startingBalance : startingBalance;
            const activeTransactions = isDemo ? DEMO_DATA.transactions : transactions;
            const activeRecurringTemplates = isDemo ? DEMO_DATA.recurringTemplates : recurringTemplates;

            const addTransaction = () => {
                if (isDemo) return;
                if (newTransaction.name && newTransaction.date) {
                    if (newTransaction.isOverride && newTransaction.overrideBalance === '') {
                        alert('Please enter a balance amount for override transaction');
                        return;
                    }
                    if (!newTransaction.isOverride && !newTransaction.amount) {
                        alert('Please enter an amount');
                        return;
                    }
                    
                    setTransactions([...transactions, {
                        ...newTransaction,
                        id: Date.now(),
                        amount: newTransaction.isOverride ? 0 : parseFloat(newTransaction.amount),
                        overrideBalance: newTransaction.isOverride ? parseFloat(newTransaction.overrideBalance) : null,
                        isRecurring: false
                    }]);
                    setNewTransaction({
                        name: '',
                        amount: '',
                        date: '',
                        type: 'expense',
                        isOverride: false,
                        overrideBalance: ''
                    });
                }
            };

            const addRecurringTemplate = () => {
                if (isDemo) return;
                if (newRecurring.name && newRecurring.amount && newRecurring.startDate) {
                    const template = {
                        ...newRecurring,
                        id: Date.now(),
                        amount: parseFloat(newRecurring.amount)
                    };
                    
                    if (newRecurring.intervalType === 'monthDay') {
                        template.monthDay = parseInt(newRecurring.monthDay);
                    } else {
                        template.intervalValue = parseInt(newRecurring.intervalValue);
                    }
                    
                    setRecurringTemplates([...recurringTemplates, template]);
                    setNewRecurring({
                        name: '',
                        amount: '',
                        startDate: '',
                        endDate: '',
                        type: 'expense',
                        intervalType: 'days',
                        intervalValue: 30,
                        monthDay: 1
                    });
                }
            };

            const deleteTransaction = (id) => {
                if (isDemo) return;
                const t = transactions.find(tx => tx.id === id);
                const label = t ? (t.isOverride ? 'balance adjustment' : 'transaction') : 'item';
                const name = t ? t.name : '';
                if (!confirm('Delete ' + label + ' "' + name + '"? This cannot be undone.')) return;
                setTransactions(transactions.filter(tx => tx.id !== id));
            };

            const startEditTransaction = (transaction) => {
                setEditingTransaction({
                    ...transaction,
                    amount: transaction.amount.toString(),
                    overrideBalance: transaction.overrideBalance !== null ? transaction.overrideBalance.toString() : ''
                });
            };

            const saveEditTransaction = () => {
                if (isDemo) return;
                if (!editingTransaction.name || !editingTransaction.date) {
                    alert('Please fill in all required fields');
                    return;
                }
                if (editingTransaction.isOverride && editingTransaction.overrideBalance === '') {
                    alert('Please enter a balance amount for override transaction');
                    return;
                }
                if (!editingTransaction.isOverride && !editingTransaction.amount) {
                    alert('Please enter an amount');
                    return;
                }

                setTransactions(transactions.map(t => 
                    t.id === editingTransaction.id 
                        ? {
                            ...editingTransaction,
                            amount: editingTransaction.isOverride ? 0 : parseFloat(editingTransaction.amount),
                            overrideBalance: editingTransaction.isOverride ? parseFloat(editingTransaction.overrideBalance) : null
                        }
                        : t
                ));
                setEditingTransaction(null);
            };

            const cancelEditTransaction = () => {
                setEditingTransaction(null);
            };

            const deleteRecurringTemplate = (id) => {
                if (isDemo) return;
                const t = recurringTemplates.find(tx => tx.id === id);
                const name = t ? t.name : '';
                if (!confirm('Delete recurring template "' + name + '"? All future occurrences will be removed. This cannot be undone.')) return;
                setRecurringTemplates(recurringTemplates.filter(tx => tx.id !== id));
            };

            const startEditTemplate = (template) => {
                setEditingTemplate({
                    ...template,
                    amount: template.amount.toString(),
                    intervalValue: template.intervalValue ? template.intervalValue.toString() : '30',
                    monthDay: template.monthDay ? template.monthDay.toString() : '1'
                });
            };

            const saveEditTemplate = () => {
                if (isDemo) return;
                if (!editingTemplate.name || !editingTemplate.amount || !editingTemplate.startDate) {
                    alert('Please fill in all required fields');
                    return;
                }

                const updatedTemplate = {
                    ...editingTemplate,
                    amount: parseFloat(editingTemplate.amount)
                };

                if (editingTemplate.intervalType === 'monthDay') {
                    updatedTemplate.monthDay = parseInt(editingTemplate.monthDay);
                } else {
                    updatedTemplate.intervalValue = parseInt(editingTemplate.intervalValue);
                }

                setRecurringTemplates(recurringTemplates.map(t => 
                    t.id === editingTemplate.id ? updatedTemplate : t
                ));
                setEditingTemplate(null);
            };

            const cancelEditTemplate = () => {
                setEditingTemplate(null);
            };

            const generateRecurringTransactions = () => {
                const generated = [];
                const endDate = new Date();
                endDate.setMonth(endDate.getMonth() + forecastMonths);

                activeRecurringTemplates.forEach(template => {
                    let currentDate = parseLocalDate(template.startDate);
                    const templateEndDate = template.endDate ? parseLocalDate(template.endDate) : null;
                    
                    while (currentDate <= endDate) {
                        if (templateEndDate && currentDate > templateEndDate) break;
                        generated.push({
                            id: 'recurring-' + template.id + '-' + currentDate.getTime(),
                            name: template.name,
                            amount: template.amount,
                            date: currentDate.getFullYear() + '-' + 
                                  String(currentDate.getMonth() + 1).padStart(2, '0') + '-' + 
                                  String(currentDate.getDate()).padStart(2, '0'),
                            type: template.type,
                            isRecurring: true,
                            templateId: template.id
                        });

                        if (template.intervalType === 'days') {
                            currentDate = new Date(currentDate.getTime());
                            currentDate.setDate(currentDate.getDate() + template.intervalValue);
                        } else if (template.intervalType === 'months') {
                            currentDate = new Date(currentDate.getTime());
                            currentDate.setMonth(currentDate.getMonth() + template.intervalValue);
                        } else if (template.intervalType === 'monthDay') {
                            currentDate = new Date(currentDate.getTime());
                            currentDate.setMonth(currentDate.getMonth() + 1);
                            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
                            currentDate.setDate(Math.min(template.monthDay, daysInMonth));
                        }
                    }
                });

                return generated;
            };

            const exportData = () => {
                if (isDemo) return;

                const sorted = allTransactions.sort((a, b) =>

                return sorted.map(t => {

                        balance += t.amount;

                if (!filterCutoff || balanceData.length === 0) return null;
                const previousTransactions = balanceData.filter(item => {
                    const itemDate = parseLocalDate(item.date);
                    return itemDate < filterCutoff;
                });
                if (previousTransactions.length === 0) return startingBalance;
                return previousTransactions[previousTransactions.length - 1].runningBalance;
            })();

                ? Math.min(...balanceData.map(d => d.runningBalance))
                : startingBalance;

                ? balanceData[balanceData.length - 1].runningBalance

                        const label = new Date(year, month, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                        return { key, label, monthIncome, monthExpenses, net, endingBal };

                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3">
                                <input type="text" placeholder="Name" value={newTransaction.name} onChange={(e) => setNewTransaction({...newTransaction, name: e.target.value})} className="border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                                {newTransaction.isOverride ? (
                                    <input type="number" placeholder="Set Balance To" value={newTransaction.overrideBalance} onChange={(e) => setNewTransaction({...newTransaction, overrideBalance: e.target.value})} className="border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                                ) : (
                                    <input type="number" placeholder="Amount" value={newTransaction.amount} onChange={(e) => setNewTransaction({...newTransaction, amount: e.target.value})} className="border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                                )}
                                <input type="date" value={newTransaction.date} onChange={(e) => setNewTransaction({...newTransaction, date: e.target.value})} className="border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                                {!newTransaction.isOverride && (
                                    <select value={newTransaction.type} onChange={(e) => setNewTransaction({...newTransaction, type: e.target.value})} className="border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white">
                                        <option value="expense">Expense</option>
                                        <option value="income">Income</option>
                                    </select>
                                )}
                                {newTransaction.isOverride && <div></div>}
                                <div className="relative group">
                                <button onClick={addTransaction} disabled={isDemo} className={'rounded-lg px-4 py-2 flex items-center justify-center gap-2 transition ' + (isDemo ? 'bg-blue-200 text-blue-300 cursor-not-allowed' : 'bg-blue-500 hover:bg-blue-600 text-white')}>
                                    <Plus />
                                    <span>Add</span>
                                </button>
                                {isDemo && <div className="absolute right-0 top-full mt-1 w-56 bg-slate-800 text-white text-xs rounded px-2 py-1 opacity-0 group-hover:opacity-100 transition pointer-events-none z-10">Switch to 'My Data' to set up accounts</div>}
                                </div>
                            </div>
                            </>
                            )}
                        </div>

                        <div className="bg-white rounded-xl shadow-lg p-6">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-2 mb-4">
                                <h2 className="text-xl font-bold text-slate-800">Cash Flow Timeline</h2>
                                <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3">
                                    <div className="flex rounded-lg border border-slate-200 overflow-hidden text-sm">
                                        <button
                                            onClick={() => setViewMode('detailed')}
                                            className={'px-3 py-1 transition ' + (viewMode === 'detailed' ? 'bg-slate-700 text-white' : 'bg-white text-slate-600 hover:bg-slate-50')}
                                        >Detailed</button>
                                        <button
                                            onClick={() => setViewMode('monthly')}
                                            className={'px-3 py-1 transition ' + (viewMode === 'monthly' ? 'bg-slate-700 text-white' : 'bg-white text-slate-600 hover:bg-slate-50')}
                                        >Monthly</button>
                                    </div>
                                    <label className="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
                                        <input 
                                            type="checkbox" 
                                            checked={hidePrevious} 
                                            onChange={(e) => handleHidePreviousChange(e.target.checked)} 
                                            className="rounded" 
                                        />
                                        <span>Hide Previous</span>
                                    </label>
                                    <div className="flex items-center gap-2 text-sm text-slate-600">
                                        <span>Start:</span>
                                        <input
                                            type="date"
                                            value={displayStartDate}
                                            onChange={(e) => handleDisplayStartDateChange(e.target.value)}
                                            className="border rounded px-2 py-1 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                        />
                                        {displayStartDate && (
                                            <button
                                                onClick={() => handleDisplayStartDateChange('')}
                                                className="text-slate-400 hover:text-red-500 transition"
                                                title="Clear date filter"
                                            ><X /></button>
                                        )}
                                    </div>
                                    <div className="flex gap-4 text-sm">
                                        <span className="text-green-600 font-semibold">Income: ${fmt(totalIncome)}</span>
                                        <span className="text-red-600 font-semibold">Expenses: ${fmt(totalExpenses)}</span>
                                    </div>
                                </div>
                            </div>
                            
                            {(() => {
                                if (balanceData.length === 0) {
                                    return (
                                        <div className="text-center py-12 text-slate-400">
                                            <div className="w-16 h-16 mx-auto mb-3 opacity-50"><DollarSign /></div>
                                            <p>No transactions yet. Add recurring or one-time transactions above.</p>
                                        </div>
                                    );
                                }
                                
                                if (filteredData.length === 0) {
                                    return (
                                        <div className="text-center py-12 text-slate-400">
                                            <div className="w-16 h-16 mx-auto mb-3 opacity-50"><Calendar /></div>
                                            <p>No transactions in this date range. Clear the start date to see all transactions.</p>
                                        </div>
                                    );
                                }

                                const balanceHeader = filterCutoff && cutoffBalance !== null && (
                                    <div className="p-4 rounded-lg bg-blue-50 border-l-4 border-blue-500 mb-2">
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-3">
                                                <Calendar />
                                                <div>
                                                    <div className="font-semibold text-slate-800">Balance as of</div>
                                                    <div className="text-sm text-slate-600">{filterCutoff.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-xs text-slate-500">Balance</div>
                                                <div className={'font-bold text-2xl ' + (cutoffBalance < 0 ? 'text-red-600' : 'text-slate-800')}>
                                                    ${fmt(cutoffBalance)}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                );

                                if (viewMode === 'monthly') {
                                    if (monthlyData.length === 0) {
                                        return (
                                            <div className="text-center py-12 text-slate-400">
                                                <div className="w-16 h-16 mx-auto mb-3 opacity-50"><Calendar /></div>
                                                <p>No complete months in the current forecast window.</p>
                                            </div>
                                        );
                                    }
                                    return (
                                        <div className="space-y-2">
                                            {balanceHeader}
                                            {monthlyData.map(row => (
                                                <div key={row.key} className={'p-3 rounded-lg border-l-4 ' + (row.net >= 0 ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500')}>
                                                    <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-2">
                                                        <div className="font-semibold text-slate-800 text-base">{row.label}</div>
                                                        <div className="flex items-center justify-end gap-4 ml-auto">
                                                            <div className="text-right min-w-24">
                                                                <div className="text-xs text-slate-500">Income</div>
                                                                <div className="font-semibold text-green-600 whitespace-nowrap">+${fmt(row.monthIncome)}</div>
                                                            </div>
                                                            <div className="text-right min-w-24">
                                                                <div className="text-xs text-slate-500">Expenses</div>
                                                                <div className="font-semibold text-red-600 whitespace-nowrap">-${fmt(row.monthExpenses)}</div>
                                                            </div>
                                                            <div className="text-right min-w-24">
                                                                <div className="text-xs text-slate-500">Net</div>
                                                                <div className={'font-bold text-lg whitespace-nowrap ' + (row.net >= 0 ? 'text-green-600' : 'text-red-600')}>
                                                                    {row.net >= 0 ? '+' : ''}{fmt(row.net)}
                                                                </div>
                                                            </div>
                                                            <div className="text-right min-w-28">
                                                                <div className="text-xs text-slate-500">Balance</div>
                                                                <div className={'font-bold text-lg whitespace-nowrap ' + (row.endingBal < 0 ? 'text-red-600' : 'text-slate-800')}>
                                                                    ${fmt(row.endingBal)}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    );
                                }
                                
                                return (
                                    <div className="space-y-2">
                                        {balanceHeader}
                                        {filteredData.map((item) => (
                                            <div key={item.id}>
                                            {editingTransaction && editingTransaction.id === item.id ? (
                                                <div className={'p-3 rounded-lg border-l-4 border-blue-500 bg-blue-50'}>
                                                    <div className="flex flex-col gap-3">
                                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-2">
                                                            <input type="text" value={editingTransaction.name} onChange={(e) => setEditingTransaction({...editingTransaction, name: e.target.value})} className="border rounded px-2 py-1 text-sm" placeholder="Name" />
                                                            {editingTransaction.isOverride ? (
                                                                <input type="number" value={editingTransaction.overrideBalance} onChange={(e) => setEditingTransaction({...editingTransaction, overrideBalance: e.target.value})} className="border rounded px-2 py-1 text-sm" placeholder="Balance" />
                                                            ) : (
                                                                <input type="number" value={editingTransaction.amount} onChange={(e) => setEditingTransaction({...editingTransaction, amount: e.target.value})} className="border rounded px-2 py-1 text-sm" placeholder="Amount" />
                                                            )}
                                                            <input type="date" value={editingTransaction.date} onChange={(e) => setEditingTransaction({...editingTransaction, date: e.target.value})} className="border rounded px-2 py-1 text-sm" />
                                                            {!editingTransaction.isOverride && (
                                                                <select value={editingTransaction.type} onChange={(e) => setEditingTransaction({...editingTransaction, type: e.target.value})} className="border rounded px-2 py-1 text-sm bg-white">
                                                                    <option value="expense">Expense</option>
                                                                    <option value="income">Income</option>
                                                                </select>
                                                            )}
                                                            {editingTransaction.isOverride && <div></div>}
                                                        </div>
                                                        <div className="flex items-center justify-between">
                                                            <label className="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
                                                                <input type="checkbox" checked={editingTransaction.isOverride} onChange={(e) => setEditingTransaction({...editingTransaction, isOverride: e.target.checked})} className="rounded" />
                                                                <span>Balance Override</span>
                                                            </label>
                                                            <div className="flex gap-2">
                                                                <button onClick={saveEditTransaction} className="flex items-center gap-1 px-3 py-1 bg-green-500 hover:bg-green-600 text-white rounded text-sm transition">
                                                                    <Save />
                                                                    <span>Save</span>
                                                                </button>
                                                                <button onClick={cancelEditTransaction} className="flex items-center gap-1 px-3 py-1 bg-slate-400 hover:bg-slate-500 text-white rounded text-sm transition">
                                                                    <X />
                                                                    <span>Cancel</span>
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className={'p-3 rounded-lg border-l-4 ' + getTransactionColor(item) + (item.isRecurring ? ' opacity-75' : '')}>
                                                    <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-2">
                                                        <div className="flex items-center gap-3 flex-wrap">
                                                            <div className="text-sm text-slate-600 font-medium">
                                                                {parseLocalDate(item.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}
                                                            </div>
                                                            <div className="flex items-center gap-2">
                                                                {item.isRecurring && <Repeat />}
                                                                <div className="font-semibold text-slate-800">{item.name}</div>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center justify-end gap-4 ml-auto">
                                                            <div className="text-right min-w-24">
                                                                <div className="text-xs text-slate-500">Amount</div>
                                                                <div className={'font-bold text-lg whitespace-nowrap ' + getAmountColor(item)}>
                                                                    {formatAmount(item)}
                                                                </div>
                                                            </div>
                                                            <div className="text-right min-w-28">
                                                                <div className="text-xs text-slate-500">Balance</div>
                                                                <div className={'font-bold text-lg whitespace-nowrap ' + (item.runningBalance < 0 ? 'text-red-600' : 'text-slate-800')}>
                                                                    ${fmt(item.runningBalance)}
                                                                </div>
                                                            </div>
                                                            {!item.isRecurring ? (
                                                                <div className="flex gap-2">
                                                                    <button onClick={() => startEditTransaction(item)} className="text-slate-400 hover:text-blue-500 transition flex-shrink-0" title="Edit">
                                                                        <Edit />
                                                                    </button>
                                                                    <button onClick={() => deleteTransaction(item.id)} className="text-slate-400 hover:text-red-500 transition flex-shrink-0" title="Delete">
                                                                        <Trash2 />
                                                                    </button>
                                                                </div>
                                                            ) : (
                                                                <div className="w-5 flex-shrink-0"></div>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                            </div>
                                        ))}
                                </div>
                                );
                            })()}
                        </div>
                    </div>
                </div>
                )}
                </div>
            );
        }

        ReactDOM.render(<CashFlowTracker />, document.getElementById('root'));
    </script>
</body>
</html>
